<div class="bottom-controls">
    <div class="tool-tabs">
        <button onclick="showPanel('textPanel')">النص</button>
        <button onclick="showPanel('colorPanel')">الألوان</button>
        <button onclick="showPanel('sizePanel')">القياسات</button>
    </div>

    <div id="textPanel" class="control-panel active">
        <div class="row">
            <button onclick="addText()">+ إضافة نص جديد</button>
            <input type="file" id="fontInput" accept=".ttf,.otf" style="display:none" onchange="loadCustomFont(this)">
            <button onclick="document.getElementById('fontInput').click()">رفع خط خاص</button>
        </div>
        
        <div class="alignment-row">
            <button onclick="alignText('left')">يسار</button>
            <button onclick="alignText('center')">وسط</button>
            <button onclick="alignText('right')">يمين</button>
            <button onclick="applyKashida()">كشيدة</button>
        </div>

        <div class="nudge-controls">
            <span>تحريك دقيق:</span>
            <button onclick="moveText(0, -1)">↑</button>
            <button onclick="moveText(0, 1)">↓</button>
            <button onclick="moveText(-1, 0)">←</button>
            <button onclick="moveText(1, 0)">→</button>
            <input type="range" id="moveStep" min="1" max="50" value="5">
        </div>
    </div>
</div>
